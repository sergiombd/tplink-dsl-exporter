# The exporter on its own. Point your existing Prometheus at exporter:9908
# (or localhost:9908). For a full demo with Prometheus + Grafana + a provisioned
# dashboard and alerts, see ./example/docker-compose.yml.
services:
  exporter:
    image: ghcr.io/sergiombd/tplink-dsl-exporter:latest
    build: ./exporter
    container_name: dsl-exporter
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      ROUTER_HOST: ${ROUTER_HOST:-192.168.1.1}
      ROUTER_TELNET_PORT: ${ROUTER_TELNET_PORT:-23}
      ROUTER_PASSWORD: ${ROUTER_PASSWORD:-admin}
      ROUTER_USERNAME: ${ROUTER_USERNAME:-}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL:-20}
      EXPORTER_PORT: 9908
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "9908:9908"
