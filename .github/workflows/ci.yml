name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Byte-compile the exporter
        run: python -m py_compile exporter/exporter.py

      - name: Lint (errors only)
        # E9/F rules catch real problems (syntax, undefined names, bad imports),
        # not style nits.
        run: uvx ruff check --select E9,F63,F7,F82,F401 exporter/

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f example/docker-compose.yml config -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./exporter
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
